<!-- create_tournament.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Tournament</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<style>
    .form-error {
        color: #ff4d4d;
        font-weight: 600;
        margin: 8px 0 16px;
    }
</style>
<body>

<section class="page-section">

    <div class="page-header">
        <h1>Create Tournament</h1>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p class="form-error">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form class="battle-form" method="POST">

        <input
            type="text"
            name="title"
            placeholder="Tournament Name"
            required
        >

        <input
            type="text"
            name="genre"
            placeholder="Genre"
            required
        >

        <textarea
            name="topic"
            placeholder="Topic"
            required
        ></textarea>

        <input
            type="number"
            name="buy_in"
            placeholder="Buy In Tokens"
            required
        >

        <button type="submit" class="primary-btn">
            CREATE
        </button>


        <input type="number" name="max_players" placeholder="Max Players (power of 2)" min="2" step="1" required>
    </form>
    
</section>

</body>
</html>
