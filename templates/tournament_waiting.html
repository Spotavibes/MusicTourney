<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting Room</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<section class="page-section">

    <div class="page-header">
        <h1>Waiting Room</h1>

        <p id="player-count">
            {{ tournament.current_players }}/8 Players Joined
        </p>
    </div>

    <div class="player-list" id="player-list">

        {% for player in players %}

        <div class="player-card">
            Seat {{ player.seat_number }}
        </div>

        {% endfor %}

    </div>

</section>

<script>
    const tournamentId = "{{ tournament.id }}";

    async function pollStatus() {
        try {
            const resp = await fetch(`/tournament-status/${tournamentId}`);
            const data = await resp.json();

            document.getElementById("player-count").textContent =
                `${data.current_players}/8 Players Joined`;

            const list = document.getElementById("player-list");
            list.innerHTML = "";

            data.players.forEach(player => {
                const div = document.createElement("div");
                div.className = "player-card";
                div.textContent = `Seat ${player.seat_number}`;
                list.appendChild(div);
            });

            if (data.started) {
                window.location.href = `/battle-start/${tournamentId}`;
            }
        } catch (err) {
            console.error("Polling failed:", err);
        }
    }

    setInterval(pollStatus, 2000);
</script>

</body>
</html>
