<!-- tournament_waiting.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting Room</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<section class="page-section waiting-page">
    <div class="waiting-shell">
        <div class="page-header waiting-header">
            <span class="kicker">Lobby</span>
            <h1>Waiting Room</h1>
            <p id="player-count">
                {{ tournament.current_players }}/8 Players Joined
            </p>
        </div>

        <div class="waiting-card">
            <p class="waiting-copy">Players are joining now. The bracket opens automatically when all seats are filled.</p>

            <div class="player-list waiting-grid" id="player-list">
                {% for player in players %}
                <div class="player-card waiting-seat">
                    Seat {{ player.seat_number }}
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>

<script>
    const tournamentId = "{{ tournament.id }}";

    async function pollStatus() {
        try {
            const resp = await fetch(`/tournament-status/${tournamentId}`);
            const data = await resp.json();

            document.getElementById("player-count").textContent =
                `${data.current_players}/8 Players Joined`;

            const list = document.getElementById("player-list");
            list.innerHTML = "";

            data.players.forEach(player => {
                const div = document.createElement("div");
                div.className = "player-card waiting-seat";
                div.textContent = `Seat ${player.seat_number}`;
                list.appendChild(div);
            });

            if (data.started) {
                window.location.href = `/battle-start/${tournamentId}`;
            }
        } catch (err) {
            console.error("Polling failed:", err);
        }
    }

    setInterval(pollStatus, 2000);
</script>

</body>
</html>
