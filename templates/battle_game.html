<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Game</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        

        

        .stopwatch-wrap {
            position: relative;
            width: 68px;
            height: 68px;
            margin-top: -4px;
        }

        .stopwatch-ring {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .stopwatch-track {
            fill: none;
            stroke: rgba(255,255,255,0.12);
            stroke-width: 8;
        }

        .stopwatch-progress {
            fill: none;
            stroke: gold;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 276.46;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.25s linear, stroke 0.3s ease;
        }

        .stopwatch-progress.urgent { stroke: #ff4444; }
        .stopwatch-progress.warning { stroke: #ff9c33; }

        .stopwatch-label {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: white;
        }

        
        @keyframes payout-burst {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.0); opacity: 0; }
        }

        .token-payout-notification.burst {
            animation: payout-burst 1.8s ease forwards;
        }

        @keyframes winner-pulse {
            0%, 100% { transform: scale(1.08); }
            50% { transform: scale(1.18); }
        }

        .side-title.winner-text {
            animation: winner-pulse 0.9s ease-in-out 2;
        }

        @keyframes side-glow-win {
            0% { box-shadow: inset 0 0 0px rgba(255, 215, 0, 0); }
            100% { box-shadow: inset 0 0 80px rgba(255, 215, 0, 0.35); }
        }

        .side.winner-glow {
            animation: side-glow-win 0.6s ease forwards;
        }

        @keyframes vote-squish {
            0% { transform: scale(1); }
            40% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }

        .vote-btn.pressed {
            animation: vote-squish 0.25s ease;
        }

        .vote-count.bump {
            animation: vote-squish 0.25s ease;
        }

        .countdown-timer.urgent {
            color: #ff4444;
            transition: color 0.3s ease;
        }

        .countdown-timer.warning {
            color: #ff9c33;
            transition: color 0.3s ease;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
        }

        .play-btn {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .play-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        }

        .play-btn:not(:disabled):active {
            transform: translateY(0px) scale(0.97);
        }
        .token-payout-notification {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 30px;
    font-weight: 900;
    color: gold;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.9), 0 0 40px rgba(255, 215, 0, 0.6);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.4s ease, transform 0.4s ease;
}

.token-payout-notification.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}
        .battle-arena {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 24px;
            box-sizing: border-box;
            max-height: 100vh;
            overflow: hidden;
        }

        .side.blue-side {
            background-color: rgba(30, 100, 220, 0.12);
            border-right: 2px solid rgba(255, 255, 255, 0.1);
        }

        .side.red-side {
            background-color: rgba(220, 40, 40, 0.12);
        }

        .side-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .blue-side .side-title {
            color: #4d8dff;
        }

        .red-side .side-title {
            color: #ff5c5c;
        }

        .embed-wrapper {
    position: relative;
    width: 100%;
    max-width: 520px;
}

    /* Target the iframe directly, not just "> div", since the Spotify API
    may replace the container element with the iframe itself. */
    .embed-wrapper iframe {
        pointer-events: none !important;
    }

    .embed-wrapper::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 10;
        cursor: not-allowed;
        background: transparent;
    }

        .play-btn {
            flex: none;
            align-self: center;
            margin-top: 20px;
            width: 100%;
            max-width: 520px;
            height: auto;
            padding: 16px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        .play-btn.blue-btn {
            background: linear-gradient(135deg, #2f7bff, #1447a8);
            box-shadow: 0 3px 12px rgba(47, 123, 255, 0.35);
        }

        .play-btn.red-btn {
            background: linear-gradient(135deg, #ff4d4d, #a81414);
            box-shadow: 0 3px 12px rgba(255, 77, 77, 0.35);
        }

        .play-btn:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .vote-btn {
            flex: none;
            align-self: center;
            margin-top: 12px;
            width: 100%;
            max-width: 520px;
            height: auto;
            padding: 16px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            opacity: 0.3;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .vote-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .vote-btn.voted-locked {
            opacity: 0.4 !important;
            cursor: not-allowed;
            background-color: #444 !important;
            pointer-events: none;
        }

        .vote-btn.blue-btn {
            background: linear-gradient(135deg, #2f7bff, #1447a8);
            box-shadow: 0 3px 14px rgba(47, 123, 255, 0.4);
        }

        .vote-btn.red-btn {
            background: linear-gradient(135deg, #ff4d4d, #a81414);
            box-shadow: 0 3px 14px rgba(255, 77, 77, 0.4);
        }

        .vote-count {
            margin-top: 8px;
            font-size: 14px;
            font-weight: bold;
            opacity: 0.85;
        }

        .status-bar {
            text-align: center;
            padding: 4px 20px 2px 20px;
            font-size: 24px;
            font-weight: 800;
            opacity: 0.95;
        }

        .countdown-timer {
            margin-top: 4px;
            font-size: 20px;
            font-weight: bold;
            color: gold;
        }

        .side.loser {
            opacity: 0.35;
            filter: grayscale(70%);
            transition: opacity 0.6s ease, filter 0.6s ease;
        }

        .side-title.winner-text {
            color: gold !important;
        }

        .side-title.winner-text {
            color: gold !important;
            font-size: 30px;
            transform: scale(1.08);
            transition: font-size 0.4s ease, transform 0.4s ease;
}
                .embed-wrapper {
    position: relative;
    width: 100%;
    max-width: 520px;
}

        .embed-wrapper > div {
            pointer-events: none;
}

        .embed-wrapper::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 2;
    cursor: not-allowed;
}
    </style>
</head>

<script>
    
    // --- Lightweight synthesized sound engine — no audio files needed ---
    const SoundFX = (() => {
        let ctx = null;
        let muted = false;

        let compressor = null;

        function getCtx() {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                compressor = ctx.createDynamicsCompressor();
                compressor.threshold.value = -18;
                compressor.knee.value = 12;
                compressor.ratio.value = 8;
                compressor.attack.value = 0.003;
                compressor.release.value = 0.15;
                compressor.connect(ctx.destination);
            }
            return ctx;
        }

        function tone(freq, duration, type = "sine", startGain = 0.15, delay = 0) {
            if (muted) return;
            const audioCtx = getCtx();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(startGain, audioCtx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
            osc.connect(gain);
            gain.connect(compressor);
            osc.start(audioCtx.currentTime + delay);
            osc.stop(audioCtx.currentTime + delay + duration);
        }

        

        return {
            setMuted(val) { muted = val; },
            isMuted() { return muted; },

            click() { tone(600, 0.08, "square", 0.8); },

            turnWhoosh() {
                tone(200, 0.25, "sine", 0.6);
                tone(400, 0.2, "sine", 0.45, 0.05);
            },

            voteCast() {
                tone(500, 0.1, "triangle", 0.9);
                tone(750, 0.12, "triangle", 0.8, 0.06);
            },

            

            winFanfare() {
                const notes = [523, 659, 784, 1046];
                notes.forEach((freq, i) => tone(freq, 0.35, "triangle", 0.6, i * 0.12));
            },

            tokenChime() {
                const notes = [1046, 1318, 1568];
                notes.forEach((freq, i) => tone(freq, 0.25, "sine", 0.55, i * 0.07));
            },
        };
    })();

    // --- Confetti burst (canvas-based, no libraries needed) ---
    function fireConfetti() {
        const canvas = document.getElementById("confetti-canvas");
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);

        const colors = ["#FFD700", "#FF5C5C", "#4D8DFF", "#FFFFFF", "#FFA500"];
        const particles = Array.from({ length: 140 }, () => ({
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            vx: (Math.random() - 0.5) * 14,
            vy: (Math.random() - 1.2) * 14,
            size: Math.random() * 6 + 4,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * 360,
            rotationSpeed: (Math.random() - 0.5) * 12,
            gravity: 0.35,
            life: 100,
        }));

        function frame() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            let alive = false;
            for (const p of particles) {
                if (p.life <= 0) continue;
                alive = true;
                p.vy += p.gravity;
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotationSpeed;
                p.life -= 1;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.globalAlpha = Math.max(p.life / 100, 0);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.restore();
            }
            if (alive) {
                requestAnimationFrame(frame);
            } else {
                ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            }
        }
        requestAnimationFrame(frame);
    }
</script>


<script>
    const tokenPayoutEl = document.getElementById("token-payout-notification");
    const matchIndex = "{{ match.index }}";

    const statusText = document.getElementById("status-text");
    const turnStopwatchWrap = document.getElementById("turn-stopwatch-wrap");
    const turnRingProgress = document.getElementById("turn-ring-progress");
    const turnCountdownNumEl = document.getElementById("turn-countdown-num");
    const p1Wrapper = document.getElementById("p1-embed-wrapper");
    const p2Wrapper = document.getElementById("p2-embed-wrapper");

    const p1PlayBtn = document.getElementById("p1-play-btn");
    const p2PlayBtn = document.getElementById("p2-play-btn");

    const voteP1Btn = document.getElementById("vote-p1-btn");
    const voteP2Btn = document.getElementById("vote-p2-btn");
    const p1VoteCount = document.getElementById("p1-vote-count");
    const p2VoteCount = document.getElementById("p2-vote-count");



    let p1Controller = null;
    let p2Controller = null;

    // Disable both play buttons until the Spotify embeds finish loading.
    p1PlayBtn.disabled = true;
    p2PlayBtn.disabled = true;
    statusText.textContent = "Loading songs...";

    window.onSpotifyIframeApiReady = (IFrameAPI) => {

        const p1Element = document.getElementById("p1-embed-container");
        const p1Options = {
            uri: spotifyUrlToUri(p1Element.dataset.embedUrl),
            width: "100%",
            height: "260",
        };

        IFrameAPI.createController(p1Element, p1Options, (controller) => {
            p1Controller = controller;
            checkBothLoaded();
        });

        const p2Element = document.getElementById("p2-embed-container");
        const p2Options = {
            uri: spotifyUrlToUri(p2Element.dataset.embedUrl),
            width: "100%",
            height: "260",
        };

        IFrameAPI.createController(p2Element, p2Options, (controller) => {
            p2Controller = controller;
            checkBothLoaded();
        });
    };

    function spotifyUrlToUri(embedUrl) {
        // Converts https://open.spotify.com/embed/track/XXXX?... into spotify:track:XXXX
        const match = embedUrl.match(/embed\/(track|album|playlist|episode)\/([a-zA-Z0-9]+)/);
        if (!match) {
            return embedUrl;
        }
        const type = match[1];
        const id = match[2];
        return `spotify:${type}:${id}`;
    }

    const RING_CIRCUMFERENCE = 276.46;

    function updateStopwatch(secondsLeft, totalSeconds) {
        const clamped = Math.max(0, secondsLeft);
        const fraction = Math.max(0, Math.min(1, clamped / totalSeconds));
        turnStopwatchWrap.style.display = "block";
        turnCountdownNumEl.textContent = clamped;
        turnRingProgress.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - fraction);

        turnRingProgress.classList.remove("warning", "urgent");
        if (clamped <= totalSeconds * 0.2) {
            turnRingProgress.classList.add("urgent");
        } else if (clamped <= totalSeconds * 0.45) {
            turnRingProgress.classList.add("warning");
        }
    }

    function hideStopwatch() {
        turnStopwatchWrap.style.display = "none";
    }



function checkBothLoaded() {
        if (p1Controller && p2Controller) {
            statusText.textContent = "Loading match state...";
        }
    }

    const MY_SIDE = "{{ my_side or '' }}"; // 'p1', 'p2', or ''

    const p1PauseBtn = document.getElementById("p1-pause-btn");
    const p2PauseBtn = document.getElementById("p2-pause-btn");
    const p1EndTurnBtn = document.getElementById("p1-endturn-btn");
    const p2EndTurnBtn = document.getElementById("p2-endturn-btn");

    async function requestPlay(side) {
        if (MY_SIDE !== side) return; // client-side convenience only — server re-checks
        try {
            const resp = await fetch(`/play-turn/${matchIndex}`, { method: "POST" });
            const data = await resp.json();
            if (!resp.ok) console.error("play-turn rejected:", data.error);
        } catch (err) {
            console.error("play-turn failed:", err);
        }
    }

    async function requestPause(side) {
        if (MY_SIDE !== side) return;
        await fetch(`/pause-turn/${matchIndex}`, { method: "POST" });
    }

    async function requestResume(side) {
        if (MY_SIDE !== side) return;
        await fetch(`/resume-turn/${matchIndex}`, { method: "POST" });
    }

    async function requestEndTurn(side) {
        if (MY_SIDE !== side) return;
        try {
            const resp = await fetch(`/end-turn/${matchIndex}`, { method: "POST" });
            const data = await resp.json();
            if (!resp.ok) console.error("end-turn rejected:", data.error);
        } catch (err) {
            console.error("end-turn failed:", err);
        }
    }

    p1PlayBtn.addEventListener("click", () => { SoundFX.click(); requestPlay("p1"); });
    p2PlayBtn.addEventListener("click", () => { SoundFX.click(); requestPlay("p2"); });
    p1PauseBtn.addEventListener("click", () => {
        SoundFX.click();
        p1PauseBtn.textContent === "PAUSE" ? requestPause("p1") : requestResume("p1");
    });
    p2PauseBtn.addEventListener("click", () => {
        SoundFX.click();
        p2PauseBtn.textContent === "PAUSE" ? requestPause("p2") : requestResume("p2");
    });
    p1EndTurnBtn.addEventListener("click", () => { SoundFX.click(); requestEndTurn("p1"); });
    p2EndTurnBtn.addEventListener("click", () => { SoundFX.click(); requestEndTurn("p2"); });

    // --- Server-driven playback sync: this is what makes BOTH browsers hear the song ---
   let lastTurnState = null;
    let lastPlayingSide = null;
    let lastTurnOwner = null;
    let lastTurnSecondsLeft = null;

    async function pollTurnStatus() {
        if (!p1Controller || !p2Controller) return;
        try {
            const resp = await fetch(`/turn-status/${matchIndex}`);
            const data = await resp.json();
            if (data.current_phase !== "live") {
                // We've left the live-turn phase (voting/complete) — make sure
                // playback actually stops instead of running forever.
                if (lastTurnState !== null || lastPlayingSide !== null) {
                    p1Controller.pause();
                    p2Controller.pause();
                    lastTurnState = null;
                    lastPlayingSide = null;
                }
                turnCountdownEl.textContent = "";
                playCountdownEl.textContent = "";
                return;
            }

            const { current_turn, turn_state, playing_side, p1_has_played, p2_has_played, turn_started_at, turn_wait_started_at } = data;

            const TURN_TOTAL = 15;

            if (turn_started_at && turn_state === "playing") {
                const startedMs = new Date(turn_started_at).getTime();
                const elapsedSec = (Date.now() - startedMs) / 1000;
                const secondsLeft = Math.max(0, Math.ceil(TURN_TOTAL - elapsedSec));
                updateStopwatch(secondsLeft, TURN_TOTAL);

                lastTurnSecondsLeft = secondsLeft;
            } else if (data.current_phase === "live") {
                hideStopwatch();
                lastTurnSecondsLeft = null;
            }

            if (turn_wait_started_at && turn_state === "idle" && current_turn !== "done") {
                const waitStartedMs = new Date(turn_wait_started_at).getTime();
                const waitElapsedSec = (Date.now() - waitStartedMs) / 1000;
                const waitSecondsLeft = Math.max(0, Math.ceil(3 - waitElapsedSec));
                playCountdownEl.textContent = `Auto-play in ${waitSecondsLeft}s`;
            } else {
                playCountdownEl.textContent = "";
            }

           // Drive both local Spotify controllers from shared server state,
            // but only call play()/pause() when something actually changed —
            // calling play() on an already-playing embed restarts the track.
            const stateChanged = (turn_state !== lastTurnState) || (playing_side !== lastPlayingSide);
            if (stateChanged) {
                if (turn_state === "playing") {
                    if (playing_side === "p1") { p1Controller.play(); p2Controller.pause(); }
                    else if (playing_side === "p2") { p2Controller.play(); p1Controller.pause(); }
                } else {
                    p1Controller.pause();
                    p2Controller.pause();
                }
            }

            // Update status text + whose turn it is, with a whoosh on change
            if (current_turn !== lastTurnOwner && (current_turn === "p1" || current_turn === "p2")) {
                SoundFX.turnWhoosh();
            }
            lastTurnOwner = current_turn;

            if (current_turn === "p1") statusText.textContent = "Blue team's turn";
            else if (current_turn === "p2") statusText.textContent = "Red team's turn";

            // Show/hide controls based on MY_SIDE and current_turn
            const iAmP1Active = MY_SIDE === "p1" && current_turn === "p1";
            const iAmP2Active = MY_SIDE === "p2" && current_turn === "p2";

            p1PlayBtn.disabled = !(iAmP1Active && !p1_has_played);
            p2PlayBtn.disabled = !(iAmP2Active && !p2_has_played);
            p1PlayBtn.textContent = p1_has_played ? "PLAYED" : "PLAY SONG";
            p2PlayBtn.textContent = p2_has_played ? "PLAYED" : "PLAY SONG";

            p1PauseBtn.style.display = (MY_SIDE === "p1" && playing_side === "p1") ? "block" : "none";
            p2PauseBtn.style.display = (MY_SIDE === "p2" && playing_side === "p2") ? "block" : "none";
            p1PauseBtn.textContent = (playing_side === "p1" && turn_state === "playing") ? "PAUSE" : "RESUME";
            p2PauseBtn.textContent = (playing_side === "p2" && turn_state === "playing") ? "PAUSE" : "RESUME";

            p1EndTurnBtn.style.display = (MY_SIDE === "p1" && playing_side === "p1") ? "block" : "none";
            p2EndTurnBtn.style.display = (MY_SIDE === "p2" && playing_side === "p2") ? "block" : "none";

            lastTurnState = turn_state;
            lastPlayingSide = playing_side;
        } catch (err) {
            console.error("turn-status poll failed:", err);
        }
    }

setInterval(pollTurnStatus, 1500);
const playCountdownEl = document.getElementById("play-countdown");

async function checkPlayTimeout() {
    try {
        const resp = await fetch(`/check-play-timeout/${matchIndex}`, { method: "POST" });
        const data = await resp.json();
        if (data.auto_played) {
            playCountdownEl.textContent = "";
        }
    } catch (err) {
        console.error("check-play-timeout failed:", err);
    }
}

setInterval(checkPlayTimeout, 1000);



async function checkTurnTimeout() {
    try {
        const resp = await fetch(`/check-turn-timeout/${matchIndex}`, { method: "POST" });
        const data = await resp.json();
        if (data.expired) {
            turnCountdownEl.textContent = "";
        }
    } catch (err) {
        console.error("check-turn-timeout failed:", err);
    }
}

setInterval(checkTurnTimeout, 1000);



   let hasVoted = false;

async function checkVoteStatus() {
    try {
        const resp = await fetch(`/vote-status/${matchIndex}`);
        const data = await resp.json();
        if (data.has_voted) {
            lockVoteButtons(data.side);
        }
    } catch (err) {
        console.error("Vote status check failed:", err);
    }
}

function lockVoteButtons(votedSide) {
    hasVoted = true;
    voteP1Btn.disabled = true;
    voteP2Btn.disabled = true;
    voteP1Btn.classList.add("voted-locked");
    voteP2Btn.classList.add("voted-locked");

    if (votedSide === "p1") {
        voteP1Btn.textContent = "VOTED";
    } else if (votedSide === "p2") {
        voteP2Btn.textContent = "VOTED";
    }
}

async function castVote(side) {
    if (hasVoted) return;

    SoundFX.voteCast();
    const pressedBtn = side === "p1" ? voteP1Btn : voteP2Btn;
    pressedBtn.classList.add("pressed");
    setTimeout(() => pressedBtn.classList.remove("pressed"), 300);

    // Optimistically lock immediately so spam-clicking can't fire multiple requests.
    hasVoted = true;
    voteP1Btn.disabled = true;
    voteP2Btn.disabled = true;

    try {
        const resp = await fetch(`/vote/${matchIndex}/${side}`, { method: "POST" });
        const data = await resp.json();

        if (!resp.ok) {
            console.error("Vote rejected:", data.error);
            if (data.already_voted) {
                lockVoteButtons(data.side);
            } else {
                // Some other failure (voting closed, etc) — leave locked, don't re-enable.
                hasVoted = true;
            }
            return;
        }

        p1VoteCount.textContent = `${data.p1_votes} votes`;
        p2VoteCount.textContent = `${data.p2_votes} votes`;
        p1VoteCount.classList.add("bump");
        p2VoteCount.classList.add("bump");
        setTimeout(() => { p1VoteCount.classList.remove("bump"); p2VoteCount.classList.remove("bump"); }, 300);
        lockVoteButtons(data.voted_side);
    } catch (err) {
        console.error("Vote failed:", err);
    }
}

    let winnerShown = false;
    let votingUnlocked = false;
    
    let countdownInterval = null;

    async function pollMatchStatus() {
    try {
        const resp = await fetch(`/match-status/${matchIndex}`);
        const data = await resp.json();

        p1VoteCount.textContent = `${data.p1_votes} votes`;
        p2VoteCount.textContent = `${data.p2_votes} votes`;

        if (data.current_phase === "voting" && !votingUnlocked) {
            votingUnlocked = true;
            statusText.textContent = "Vote for your favorite!";
            voteP1Btn.classList.add("visible");
            voteP2Btn.classList.add("visible");
            checkVoteStatus();

            if (data.voting_ends_at && !countdownInterval) {
                const VOTE_TOTAL = 30;
                const endsAt = new Date(data.voting_ends_at).getTime();
                countdownInterval = setInterval(() => {
                    const secondsLeft = Math.max(0, Math.ceil((endsAt - Date.now()) / 1000));
                    if (secondsLeft > 0) {
                        statusText.textContent = "Vote for your favorite!";
                        updateStopwatch(secondsLeft, VOTE_TOTAL);
                    } else {
                        statusText.textContent = "Voting closed...";
                        hideStopwatch();
                        clearInterval(countdownInterval);
                    }
                }, 250);
            }
        }

        if (data.current_phase === "complete" && !winnerShown) {
            winnerShown = true;
            if (countdownInterval) clearInterval(countdownInterval);
            hideStopwatch();

            voteP1Btn.classList.remove("visible");
            voteP2Btn.classList.remove("visible");

            const winnerName = data.winner === "p1" ? "{{ p1_username }}" : "{{ p2_username }}";
            const winnerSeat = data.winner === "p1" ? "{{ match.p1_seat }}" : "{{ match.p2_seat }}";
            const winnerTitleEl = data.winner === "p1"
                ? document.querySelector(".blue-side .side-title")
                : document.querySelector(".red-side .side-title");
            const winnerSideEl = data.winner === "p1"
                ? document.querySelector(".blue-side")
                : document.querySelector(".red-side");
            const loserSideClass = data.winner === "p1" ? "red-side" : "blue-side";

            winnerTitleEl.textContent = `Seat ${winnerSeat} — ${winnerName}`;
            winnerTitleEl.classList.add("winner-text");

            const winnerSideClass = data.winner === "p1" ? "blue-side" : "red-side";
            document.querySelector(`.${winnerSideClass}`).classList.add("winner-glow");
            document.querySelector(`.${loserSideClass}`).classList.add("loser");

            SoundFX.winFanfare();
            fireConfetti();

            // Show the "+N tokens" payout notification, with a delayed chime + burst
            // so it lands right as the fanfare peaks instead of all at once.
            setTimeout(() => {
                tokenPayoutEl.textContent = `+${data.tokens_awarded} tokens`;
                tokenPayoutEl.classList.add("visible", "burst");
                SoundFX.tokenChime();
            }, 500);

            statusText.textContent = "";

            setTimeout(() => {
                window.location.href = `/battle-start/${data.which_tourney}`;
            }, 5000);
        }
    } catch (err) {
        console.error("Match status poll failed:", err);
    }
}

setInterval(pollMatchStatus, 3000);




    voteP1Btn.addEventListener("click", () => castVote("p1"));
    voteP2Btn.addEventListener("click", () => castVote("p2"));
</script>
