<!-- battle_game.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Game</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .battle-arena {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
            box-sizing: border-box;
        }

        .side.blue-side {
            background-color: rgba(30, 100, 220, 0.12);
            border-right: 2px solid rgba(255, 255, 255, 0.1);
        }

        .side.red-side {
            background-color: rgba(220, 40, 40, 0.12);
        }

        .side-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 24px;
        }

        .blue-side .side-title {
            color: #4d8dff;
        }

        .red-side .side-title {
            color: #ff5c5c;
        }

        .embed-wrapper {
            width: 100%;
            max-width: 420px;
            opacity: 0.4;
            transition: opacity 0.4s ease;
        }

        .embed-wrapper.active {
            opacity: 1;
        }

        .embed-wrapper > div {
            border-radius: 12px;
            overflow: hidden;
        }

        .play-btn {
            margin-top: 20px;
            width: 100%;
            max-width: 420px;
            padding: 16px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        .play-btn.blue-btn {
            background-color: #1e64dc;
        }

        .play-btn.red-btn {
            background-color: #dc2828;
        }

        .play-btn:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .vote-btn {
            margin-top: 30px;
            width: 100%;
            max-width: 420px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            opacity: 0.3;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .vote-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .vote-btn.blue-btn {
            background-color: #1e64dc;
        }

        .vote-btn.red-btn {
            background-color: #dc2828;
        }

        .vote-count {
            margin-top: 14px;
            font-size: 16px;
            font-weight: bold;
            opacity: 0.85;
        }

        .status-bar {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            opacity: 0.85;
        }

        .winner-highlight {
                outline: 4px solid gold;
                box-shadow: 0 0 30px gold;
            }

        .countdown-timer {
            margin-top: 12px;
            font-size: 28px;
            font-weight: bold;
            color: gold;
        }

        .side.loser {
            opacity: 0.35;
            filter: grayscale(70%);
            transition: opacity 0.6s ease, filter 0.6s ease;
        }

        .side-title.winner-text {
            color: gold !important;
        }

        .side-title.winner-text {
            color: gold !important;
            font-size: 30px;
            transform: scale(1.08);
            transition: font-size 0.4s ease, transform 0.4s ease;
}
    </style>
</head>

<body>

<div class="status-bar" id="status-text">Get ready...</div>
<div class="countdown-timer" id="countdown-timer"></div>

<div class="battle-arena">

    <div class="side blue-side">
        <div class="side-title">Seat {{ match.p1_seat }} — {{ p1_username }}</div>

        <div class="embed-wrapper" id="p1-embed-wrapper">
            <div id="p1-embed-container" data-embed-url="{{ match.p1_song }}"></div>
        </div>

        <button class="play-btn blue-btn" id="p1-play-btn">
            PLAY SONG
        </button>

        <button class="vote-btn blue-btn" id="vote-p1-btn">
            VOTE {{ p1_username }}
        </button>

        <div class="vote-count" id="p1-vote-count">
            {{ match.p1_votes or 0 }} votes
        </div>
    </div>

    <div class="side red-side">
        <div class="side-title">Seat {{ match.p2_seat }} — {{ p2_username }}</div>

        <div class="embed-wrapper" id="p2-embed-wrapper">
            <div id="p2-embed-container" data-embed-url="{{ match.p2_song }}"></div>
        </div>

        <button class="play-btn red-btn" id="p2-play-btn">
            PLAY SONG
        </button>

        <button class="vote-btn red-btn" id="vote-p2-btn">
            VOTE {{ p2_username }}
        </button>

        <div class="vote-count" id="p2-vote-count">
            {{ match.p2_votes or 0 }} votes
        </div>
    </div>

</div>

<script src="https://open.spotify.com/embed/iframe-api/v1" async></script>

<script>
    const matchIndex = "{{ match.index }}";

    const statusText = document.getElementById("status-text");
    const p1Wrapper = document.getElementById("p1-embed-wrapper");
    const p2Wrapper = document.getElementById("p2-embed-wrapper");

    const p1PlayBtn = document.getElementById("p1-play-btn");
    const p2PlayBtn = document.getElementById("p2-play-btn");

    const voteP1Btn = document.getElementById("vote-p1-btn");
    const voteP2Btn = document.getElementById("vote-p2-btn");
    const p1VoteCount = document.getElementById("p1-vote-count");
    const p2VoteCount = document.getElementById("p2-vote-count");

    let currentTurn = "p1"; // p1 goes first
    let p1HasPlayed = false;
    let p2HasPlayed = false;

    let p1Controller = null;
    let p2Controller = null;

    // Disable both play buttons until the Spotify embeds finish loading.
    p1PlayBtn.disabled = true;
    p2PlayBtn.disabled = true;
    statusText.textContent = "Loading songs...";

    window.onSpotifyIframeApiReady = (IFrameAPI) => {

        const p1Element = document.getElementById("p1-embed-container");
        const p1Options = {
            uri: spotifyUrlToUri(p1Element.dataset.embedUrl),
            width: "100%",
            height: "352",
        };

        IFrameAPI.createController(p1Element, p1Options, (controller) => {
            p1Controller = controller;
            checkBothLoaded();
        });

        const p2Element = document.getElementById("p2-embed-container");
        const p2Options = {
            uri: spotifyUrlToUri(p2Element.dataset.embedUrl),
            width: "100%",
            height: "352",
        };

        IFrameAPI.createController(p2Element, p2Options, (controller) => {
            p2Controller = controller;
            checkBothLoaded();
        });
    };

    function spotifyUrlToUri(embedUrl) {
        // Converts https://open.spotify.com/embed/track/XXXX?... into spotify:track:XXXX
        const match = embedUrl.match(/embed\/(track|album|playlist|episode)\/([a-zA-Z0-9]+)/);
        if (!match) {
            return embedUrl;
        }
        const type = match[1];
        const id = match[2];
        return `spotify:${type}:${id}`;
    }

    function checkBothLoaded() {
        if (p1Controller && p2Controller) {
            updateTurnUI();
        }
    }

    function updateTurnUI() {
        if (currentTurn === "p1") {
            statusText.textContent = "Blue team's turn — press play";
            p1PlayBtn.disabled = false;
            p2PlayBtn.disabled = true;
        } else if (currentTurn === "p2") {
            statusText.textContent = "Red team's turn — press play";
            p1PlayBtn.disabled = true;
            p2PlayBtn.disabled = false;
        } else {
        p1PlayBtn.disabled = true;
        p2PlayBtn.disabled = true;
        statusText.textContent = "Get ready to vote...";
    }}

    function playP1() {
        if (currentTurn !== "p1" || p1HasPlayed || !p1Controller) {
            return;
        }

        p1HasPlayed = true;
        p1Wrapper.classList.add("active");
        p1PlayBtn.disabled = true;
        p1PlayBtn.textContent = "PLAYING...";

        p1Controller.play();

        // Adjust this duration to roughly match the song clip length.
        setTimeout(() => {
            p1Controller.pause();
            currentTurn = "p2";
            updateTurnUI();
        }, 15000);
    }

    function playP2() {
    if (currentTurn !== "p2" || p2HasPlayed || !p2Controller) {
        return;
    }

    p2HasPlayed = true;
    p2Wrapper.classList.add("active");
    p2PlayBtn.disabled = true;
    p2PlayBtn.textContent = "PLAYING...";

    p2Controller.play();

    setTimeout(async () => {
        p2Controller.pause();
        currentTurn = "done";
        updateTurnUI();

        try {
            const resp = await fetch(`/start-voting/${matchIndex}`, { method: "POST" });
            if (!resp.ok) {
                const err = await resp.json();
                console.error("start-voting rejected:", err);
            }
        } catch (err) {
            console.error("Failed to start voting:", err);
        }
        // No longer manually revealing vote buttons here — pollMatchStatus() handles it
        // once it confirms the server actually recorded phase = "voting".
    }, 15000);
}

    p1PlayBtn.addEventListener("click", playP1);
    p2PlayBtn.addEventListener("click", playP2);

   async function castVote(side) {
    try {
        const resp = await fetch(`/vote/${matchIndex}/${side}`, {
            method: "POST",
        });
        const data = await resp.json();

        if (!resp.ok) {
            console.error("Vote rejected:", data.error);
            return;
        }

        p1VoteCount.textContent = `${data.p1_votes} votes`;
        p2VoteCount.textContent = `${data.p2_votes} votes`;
    } catch (err) {
        console.error("Vote failed:", err);
    }
}
    let winnerShown = false;
    let votingUnlocked = false;
    const countdownEl = document.getElementById("countdown-timer");
    let countdownInterval = null;

async function pollMatchStatus() {
    try {
        const resp = await fetch(`/match-status/${matchIndex}`);
        const data = await resp.json();

        p1VoteCount.textContent = `${data.p1_votes} votes`;
        p2VoteCount.textContent = `${data.p2_votes} votes`;

        if (data.current_phase === "voting" && !votingUnlocked) {
            votingUnlocked = true;
            statusText.textContent = "Vote for your favorite!";
            voteP1Btn.classList.add("visible");
            voteP2Btn.classList.add("visible");

            if (data.voting_ends_at && !countdownInterval) {
                const endsAt = new Date(data.voting_ends_at).getTime();
                countdownInterval = setInterval(() => {
                    const secondsLeft = Math.max(0, Math.ceil((endsAt - Date.now()) / 1000));
                    countdownEl.textContent = secondsLeft > 0 ? `${secondsLeft}s left to vote` : "Voting closed...";
                    if (secondsLeft <= 0) {
                        clearInterval(countdownInterval);
                    }
                }, 250);
            }
        }

       if (data.current_phase === "complete" && !winnerShown) {
            winnerShown = true;
            if (countdownInterval) clearInterval(countdownInterval);
            countdownEl.textContent = "";

            voteP1Btn.classList.remove("visible");
            voteP2Btn.classList.remove("visible");

            const winnerName = data.winner === "p1" ? "{{ p1_username }}" : "{{ p2_username }}";
            const winnerSeat = data.winner === "p1" ? "{{ match.p1_seat }}" : "{{ match.p2_seat }}";
            const winnerTitleEl = data.winner === "p1"
                ? document.querySelector(".blue-side .side-title")
                : document.querySelector(".red-side .side-title");
            const loserSideClass = data.winner === "p1" ? "red-side" : "blue-side";

            winnerTitleEl.textContent = `Seat ${winnerSeat} — ${winnerName}`;
            winnerTitleEl.classList.add("winner-text");

            document.querySelector(`.${loserSideClass}`).classList.add("loser");

            statusText.textContent = "";

            setTimeout(() => {
                window.location.href = `/battle-start/${data.which_tourney}`;
            }, 5000);
        }
    } catch (err) {
        console.error("Match status poll failed:", err);
    }
}

setInterval(pollMatchStatus, 3000);




    voteP1Btn.addEventListener("click", () => castVote("p1"));
    voteP2Btn.addEventListener("click", () => castVote("p2"));
</script>

</body>
</html>
