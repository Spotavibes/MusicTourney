<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUX WARS | Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="noise"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <nav class="navbar">
        <div class="logo"><a href="{{ url_for('home') }}">AUX WARS</a></div>

        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('battles') }}">Battles</a>
            <a href="{{ url_for('leaderboard_page') }}">Leaderboard</a>
            <a href="{{ url_for('dashboard_page') }}">Dashboard</a>
            <a href="{{ url_for('buy_tokens_page') }}">Tokens</a>
        </div>

        <a class="join-btn" href="{{ url_for('battles') }}">ENTER ARENA</a>
    </nav>

    <section class="dashboard-header">
        <div class="page-header">
            <h1>PLAYER DASHBOARD</h1>
            <p>Your account overview. Rankings live on the global leaderboard.</p>
        </div>
    </section>

    <section class="page-section">
        <div class="dashboard-summary">
            <div class="summary-card">
                <h3>My Tokens</h3>
                <strong>{{ user.token_balance }}</strong>
            </div>
        </div>

        <div class="page-header" style="margin-top: 32px;">
            <p>
                <a class="primary-btn" href="{{ url_for('leaderboard_page') }}">View global leaderboard</a>
            </p>
        </div>
    </section>

</body>
</html>
