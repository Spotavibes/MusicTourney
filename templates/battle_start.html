<!-- battle_start.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Start</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .bracket-wrapper {
            width: 100%;
            overflow-x: auto;
            padding: 20px 0;
        }

        .bracket-svg {
            display: block;
            margin: 0 auto;
        }

        .seat-text {
            font-family: inherit;
            font-size: 15px;
            opacity: 0;
            transform: translateX(-20px);
            transition: opacity 0.6s ease, transform 0.6s ease, fill 0.4s ease, font-size 0.4s ease;
        }

        .seat-text.revealed {
            opacity: 1;
            transform: translateX(0);
        }

        .seat-text.scrambling {
            animation: scramble 1.2s ease-in-out;
        }

        @keyframes scramble {
            0%   { transform: translateX(0); }
            20%  { transform: translateX(15px); }
            40%  { transform: translateX(-12px); }
            60%  { transform: translateX(8px); }
            80%  { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .seat-text.winner-seat {
            fill: gold;
            font-weight: bold;
            font-size: 16px;
        }

        .seat-text.tbd-seat {
            fill: #555;
        }

        .champion-banner {
            fill: gold;
            font-weight: bold;
            font-size: 22px;
            text-anchor: middle;
        }

        .bracket-line {
            stroke: #333;
            stroke-width: 2;
            fill: none;
        }

        .seat-box {
            stroke: #333;
            stroke-width: 2;
            fill: none;
        }

        .seat-box.tbd-box {
            stroke: #222;
            stroke-dasharray: 4 4;
        }
    </style>
</head>

<body>

<section class="page-section">

    <div class="page-header">
        <h1>{{ tournament.title }}</h1>
        {% if tournament_complete %}
        <p>Tournament Complete</p>
        {% else %}
        <p>The Bracket</p>
        {% endif %}
    </div>

    <div class="bracket-wrapper">

        <svg
            class="bracket-svg"
            viewBox="0 0 {{ bracket_layout.width }} {{ bracket_layout.height + (60 if tournament_complete and champion else 0) }}"
            xmlns="http://www.w3.org/2000/svg"
        >

            {% for line in bracket_layout.connectors %}
            <path class="bracket-line" d="M {{ line.x1 }} {{ line.y1 }} L {{ line.x2 }} {{ line.y2 }}"></path>
            {% endfor %}

            {% for box in bracket_layout.boxes %}

           <rect class="seat-box {% if not box.p1_filled %}tbd-box{% endif %}"
                x="{{ box.x }}"
                y="{{ box.y }}"
                width="{{ box.w }}"
                height="{{ box.row_h }}">
            </rect>

            <text class="seat-text scrambling
                        {% if box.p1_won %}winner-seat{% endif %}
                        {% if not box.p1_filled %}tbd-seat{% endif %}"
                x="{{ box.x + 10 }}"
                y="{{ box.y + 24 }}">

                {% if box.p1_filled %}
                    {{ box.p1_seat }}. {{ box.p1_username }}{{ box.p1_label }}
                {% else %}
                    TBD
                {% endif %}

            </text>

            <rect class="seat-box {% if not box.p2_filled %}tbd-box{% endif %}"
                x="{{ box.x }}"
                y="{{ box.y + box.row_h }}"
                width="{{ box.w }}"
                height="{{ box.row_h }}">
            </rect>

            <text class="seat-text scrambling
                        {% if box.p2_won %}winner-seat{% endif %}
                        {% if not box.p2_filled %}tbd-seat{% endif %}"
                x="{{ box.x + 10 }}"
                y="{{ box.y + box.row_h + 24 }}">

                {% if box.p2_filled %}
                    {{ box.p2_seat }}. {{ box.p2_username }}{{ box.p2_label }}
                {% else %}
                    TBD
                {% endif %}

            </text>

            {% endfor %}

            {% if tournament_complete and champion %}
            <text class="champion-banner" x="{{ bracket_layout.width / 2 }}" y="{{ bracket_layout.height + 30 }}">
                Seat {{ champion.seat }} — {{ champion.username }} WINNER
            </text>
            {% endif %}

        </svg>

    </div>

</section>

<script>
    const tourneyId = "{{ tournament.id }}";
    const scrambleKey = `auxwars_scrambled_${tourneyId}`;
    const alreadyScrambled = sessionStorage.getItem(scrambleKey) === "true";

    const seatLabels = document.querySelectorAll(".seat-text");

    seatLabels.forEach((label, index) => {
        if (alreadyScrambled) {
            label.classList.add("revealed");
            label.classList.remove("scrambling");
        } else {
            setTimeout(() => {
                label.classList.add("revealed");
            }, 300 + index * 100);

            setTimeout(() => {
                label.classList.remove("scrambling");
            }, 1500 + index * 100);
        }
    });

    if (!alreadyScrambled) {
        sessionStorage.setItem(scrambleKey, "true");
    }

    {% if tournament_complete %}
    setTimeout(() => {
        window.location.href = "{{ url_for('tournaments_page') }}";
    }, 4000);
    {% else %}
    let minDisplayElapsed = false;
    let readyMatchIndex = null;
    let redirected = false;

    setTimeout(() => {
        minDisplayElapsed = true;
        tryRedirect();
    }, 5000);

    const pollReady = setInterval(async () => {
        if (redirected) return;
        try {
            const resp = await fetch(`/next-match-ready/${tourneyId}`);
            const data = await resp.json();
            if (data.ready) {
                readyMatchIndex = data.match_index;
                tryRedirect();
            }
        } catch (err) {
            console.error("Polling failed:", err);
        }
    }, 2000);

    function tryRedirect() {
        if (redirected) return;
        if (minDisplayElapsed && readyMatchIndex) {
            redirected = true;
            clearInterval(pollReady);
            window.location.href = `/battle-game/${readyMatchIndex}`;
        }
    }
    {% endif %}
</script>

</body>
</html>
