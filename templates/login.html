<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Aux Wars</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="navbar">
      <div class="logo"><a href="/">AUX WARS</a></div>
    </div>

    <div class="page-section" style="max-width:480px;margin:120px auto;">
      <h2 style="margin-bottom:18px;">Login</h2>

   
<div style="margin-bottom:12px;">


     <form method="post" action="{{ url_for('login') }}">
  <div style="margin-bottom:12px;">
    <label>Email</label>
    <input type="email" name="username" required style="width:100%;padding:12px;border-radius:8px;margin-top:6px;background:#111;border:1px solid rgba(255,255,255,0.06);color:white;">
  </div>

        <div style="margin-bottom:12px;">
          <label>Password</label>
          <input name="password" type="password" placeholder="password" style="width:100%;padding:12px;border-radius:8px;margin-top:6px;background:#111;border:1px solid rgba(255,255,255,0.06);color:white;" required>
        </div>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
          <input id="remember" name="remember" type="checkbox">
          <label for="remember">Remember Me</label>
        </div>

        <button class="primary-btn" type="submit" style="width:100%;padding:16px;font-size:1.05rem;">Login</button>
      </form>

      <div style="margin-top:18px;color:rgba(255,255,255,0.8);">Don't have an account? <a href="{{ url_for('register') }}"><button class="secondary-btn" style="margin-left:12px;padding:8px 12px;">Register</button></a></div>
    </div>

    <div class="noise"></div>
  </body>
</html>
