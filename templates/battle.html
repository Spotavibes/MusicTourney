<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUX WARS | Enter Battle</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="noise"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <nav class="navbar">
        <div class="logo"><a href="{{ url_for('home') }}">AUX WARS</a></div>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('battles') }}">Battles</a>
            <a href="{{ url_for('leaderboard_page') }}">Leaderboard</a>
            <a href="{{ url_for('dashboard_page') }}">Dashboard</a>
        </div>
        <a class="join-btn" href="{{ url_for('battles') }}">BACK</a>
    </nav>

    <section class="page-section">
        <div class="page-header">
            <h1>ENTER BATTLE</h1>
            <p>You are entering the battle arena for <strong>{{ battle.left_name }}</strong> vs <strong>{{ battle.right_name }}</strong>.</p>
        </div>

        <div class="leaderboard-grid">
            <div class="leaderboard-card">
                <div class="rank-number">BATTLE {{ battle.id }}</div>
                <h2>{{ battle.left_name }} <span class="battle-vs-text">VS</span> {{ battle.right_name }}</h2>
                <div class="stats">
                    <span>{{ battle.genre }}</span>
                    <span>{{ battle.viewers }} viewers</span>
                </div>
                <div class="battle-actions" style="margin-top: 24px; display:flex; gap: 14px; flex-wrap: wrap;">
                    <a href="{{ url_for('spectator', battle_id=battle.id) }}" class="primary-btn">WATCH LIVE</a>
                    <a href="{{ url_for('spectator', battle_id=battle.id) }}" class="secondary-btn">SPECTATE</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
