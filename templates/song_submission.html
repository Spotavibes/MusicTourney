<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Submission</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<section class="page-section">

    <div class="page-header">
        <h1>Submit 3 Songs</h1>

        <p>
            Paste Spotify Embed Links
        </p>
    </div>

    <form method="POST" action="{{ url_for('submit_songs', tournament_id=tournament.id) }}" class="battle-form">

        <input
            type="text"
            name="embed1"
            placeholder="Spotify Embed Link #1"
            required
        >

        <input
            type="text"
            name="embed2"
            placeholder="Spotify Embed Link #2"
            required
        >

        <input
            type="text"
            name="embed3"
            placeholder="Spotify Embed Link #3"
            required
        >

        <button type="submit" class="primary-btn">
            CONTINUE
        </button>

    </form>

</section>

</body>
</html>
