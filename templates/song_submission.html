<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Submission</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<section class="page-section submission-page">
    <div class="submission-shell">
        <div class="page-header submission-header">
            <span class="kicker">Song Submission</span>
            <h1>Submit 3 Songs</h1>
            <p>Paste your Spotify embed links below.</p>
        </div>

        <form method="POST" action="{{ url_for('submit_songs', tournament_id=tournament.id) }}" class="battle-form submission-form">
            <label for="embed1">Track 1</label>
            <input
                id="embed1"
                type="text"
                name="embed1"
                placeholder="Spotify Embed Link #1"
                required
            >

            <label for="embed2">Track 2</label>
            <input
                id="embed2"
                type="text"
                name="embed2"
                placeholder="Spotify Embed Link #2"
                required
            >

            <label for="embed3">Track 3</label>
            <input
                id="embed3"
                type="text"
                name="embed3"
                placeholder="Spotify Embed Link #3"
                required
            >

            <button type="submit" class="primary-btn">
                CONTINUE
            </button>
        </form>
    </div>
</section>

</body>
</html>
