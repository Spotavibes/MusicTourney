<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUX WARS | Leaderboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="noise"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

  <nav class="navbar">
        <div class="logo"><a href="{{ url_for('home') }}">Spotavibes</a></div>

        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('tournaments_page') }}">Battles</a>
            <a href="{{ url_for('leaderboard_page') }}">Leaderboard</a>
            <a href="{{ url_for('dashboard_page') }}">Dashboard</a>
            <a href="{{ url_for('buy_tokens_page') }}">Shop</a>
        </div>

        <a class="join-btn" href="{{ url_for('battles') }}">ENTER ARENA</a>
    </nav>

    <section class="leaderboard-header">
        <div class="page-header">
            <h1>GLOBAL RANKING</h1>
            <p>See the top AUX players, climbing the ladder on the strongest streaks and biggest ELO scores.</p>
        </div>
    </section>

    <!-- TODO: put supabase api code here to load leaderboard entries dynamically -->

    <section class="page-section">
        <div class="leaderboard-grid">
            {% for player in players %}
            <div class="leaderboard-card">
                <div class="rank-number">#{{ loop.index }}</div>
                <h2>{{ player.name }}</h2>
                <div class="elo">{{ player.elo }} ELO</div>
                <!-- TO BE ADDED LATER, RIGHT NOW JUST ELO
                <div class="stats">
                    <span>{{ player.genre }}</span>
                    <span>{{ player.wins }} WINS</span>
                    <span>{{ player.streak }} STREAK</span>
                </div>
                -->
            </div>
            {% endfor %}
        </div>
    </section>

</body>
</html>
